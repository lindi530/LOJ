logger:
    fileName: "logs/logs/gin.log"   # 存放路径
    fileNameError: "logs/error/gin.log"
    appName : "GO1"
    maxSize: 1                # 每个日志的最大内存
    maxBackups: 30             # 最多可以保存都少个日志
    maxAge: 7                  # 保存时间（天）
    compress: true             # 是否压缩旧文件
#    lever: info
#    prefix: "GO1"
#    director: log
#    show_line: true
#    log_in_console: true

system:
    host: "0.0.0.0"
    scheme: ""
    port: 8080
    env: debug   #    release 生产环境（发布）     debug 开发环境    test 测试模式
snowflake:
    start_time: "2025-05-08"
    machine_id: 1
redis:
    address: "localhost:6379"
    key_prefix: "refresh_jti:"
    max_idle: 10
    idle_timeout: 300
upload:
    image:
        path: "upload/images"
        size: 2
jwt:
    access_duration: 15
    refresh_duration: 24
settings:
    user:
        avatar: "02d2b2b795d6b88dfc787bb71bfa7d41"
        quote: "无~"
        gender: "female"
language:
    cpp:
        compile_cmd: [ "g++", "code.cpp", "-o", "a.out" ]
        run_cmd: [ "./a.out" ]
        source_file: "code.cpp"
        executable: "a.out"
        output_file: "output.txt"
        language: "cpp"
        need_compile: true
    python:
        run_cmd: [ "python3", "code.py" ]
        source_file: "code.py"
        output_file: "output.txt"
        language: "python"
        need_compile: false
    go:
        compile_cmd: [ "go", "build", "-o", "main", "main.go" ]
        run_cmd: [ "./main" ]
        source_file: "main.go"
        executable: "main"
        output_file: "output.txt"
        language: "go"
        need_compile: true
