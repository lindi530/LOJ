services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: loj-nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loj-frontend
    environment:
      NODE_ENV: development
      VUE_APP_API_BASE: /api
      VUE_APP_WS_BASE_URL: ws://localhost:8080/ws
      CHOKIDAR_USEPOLLING: "true"
    expose:
      - "8080"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loj-backend
    environment:
      MYSQL_DSN: root:lindi530@tcp(mysql:3306)/LOJ_db?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TEMP_DIR: /tmp/loj-oj
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/loj-oj:/tmp/loj-oj
      - backend_logs:/app/logs
      - backend_uploads:/app/upload
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: loj-mysql
    environment:
      MYSQL_ROOT_PASSWORD: lindi530
      MYSQL_DATABASE: LOJ_db
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    expose:
      - "3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: loj-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: loj-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  backend_logs:
  backend_uploads:
