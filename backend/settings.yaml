mysql:
    host: "127.0.0.1"
    port: 3306
    db: LOJ_db
    user: root
    password: lindi530
    log_level: dev
logger:
    fileName: "logs/logs/gin.log"   # 存放路径
    fileNameError: "logs/error/gin.log"
    appName : "GO1"
    maxSize: 1                # 每个日志的最大内存
    maxBackups: 30             # 最多可以保存都少个日志
    maxAge: 7                  # 保存时间（天）
    compress: true             # 是否压缩旧文件
#    lever: info
#    prefix: "GO1"
#    director: log
#    show_line: true
#    log_in_console: true

system:
    host: "0.0.0.0"
    scheme: ""
    port: 8080
    env: debug   #    release 生产环境（发布）     debug 开发环境    test 测试模式
snowflake:
    start_time: "2025-05-08"
    machine_id: 1
redis:
    address: "localhost:6379"
    key_prefix: "refresh_jti:"
    max_idle: 10
    idle_timeout: 300
upload:
    image:
        path: "upload/images"
        size: 2
    video:
        path: "upload/video"                       # 视频业务路径
        chunk_size: 5                              # 返回给前端的建议分片大小
        max_part_count: 10000                      # MinIO 分片上传最大分片数
        chunk_upload_url_expires_minutes: 15       # 分片上传预签名 URL 过期时间（分钟）
        ffmpeg_path: "ffmpeg"                      # ffmpeg 可执行文件路径
        ffprobe_path: "ffprobe"                    # ffprobe 可执行文件路径
        cover:
            frame_count: 1                         # 封面截取帧数
            quality: 2                             # 封面图片质量参数
        hls:
            playlist_name: "master.m3u8"           # HLS 主播放列表文件名
            index_name: "index.m3u8"               # 单个清晰度播放列表文件名
            segment_seconds: 6                     # HLS 切片时长（秒）
            audio_bitrate_kbps: 128                # 音频码率（kbps）
            preset: "veryfast"                     # x264 编码预设
            profile: "main"                        # H.264 profile
            variants:                              # HLS 输出清晰度档位
                - dir: "480"                       # 该档位输出目录
                  resolution: "480P"               # 该档位展示名称
                  height: 480                      # 该档位视频高度
                  bitrate_kbps: 1000               # 该档位视频码率（kbps）
                - dir: "720"                       # 该档位输出目录
                  resolution: "720P"               # 该档位展示名称
                  height: 720                      # 该档位视频高度
                  bitrate_kbps: 2500               # 该档位视频码率（kbps）
                - dir: "1080"                      # 该档位输出目录
                  resolution: "1080P"              # 该档位展示名称
                  height: 1080                     # 该档位视频高度
                  bitrate_kbps: 4500               # 该档位视频码率（kbps）
jwt:
    access_duration: 15
    refresh_duration: 24
settings:
    user:
        avatar: "02d2b2b795d6b88dfc787bb71bfa7d41"
