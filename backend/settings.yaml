        need_compile: false
    go:
        compile_cmd: [ "go", "build", "-o", "main", "main.go" ]
        run_cmd: [ "./main" ]
        source_file: "main.go"
        executable: "main"
        output_file: "output.txt"
        language: "go"
        need_compile: true
rabbitmq:
