services:
  backend:
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/loj-oj:/tmp/loj-oj
      - backend_logs:/app/logs
      - backend_uploads:/app/upload

  frontend:
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
